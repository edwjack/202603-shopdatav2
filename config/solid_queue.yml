default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: [default]
      threads: 3
      processes: 1
      polling_interval: 0.1
    - queues: [scraping]
      threads: 1
      processes: 1
      polling_interval: 0.1

development:
  <<: *default

test:
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: "*"
      threads: 3
      processes: 1
      polling_interval: 0.1

production:
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: [default]
      threads: 5
      processes: 2
      polling_interval: 0.1
    - queues: [scraping]
      threads: 2
      processes: 1
      polling_interval: 0.1
