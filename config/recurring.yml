# Infrastructure only — all data/analysis/sync jobs are on-demand via Jobs UI
stale_state_cleanup:
  class: StaleStateCleanupJob
  schedule: "30 * * * *"

scraper_health_check:
  class: ScraperHealthCheckJob
  schedule: "*/15 * * * *"

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
